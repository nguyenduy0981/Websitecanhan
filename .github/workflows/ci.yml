name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/lovebox_ci"
  SESSION_SECRET: "ci-only-session-secret-not-for-real-use-00000"
  CRON_SECRET: "ci-only-cron-secret-0000"
  APP_URL: "http://localhost:3000"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
