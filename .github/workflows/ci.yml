name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/lovebox_ci"
  SESSION_SECRET: "ci-only-session-secret-not-for-real-use-00000"
  CRON_SECRET: "ci-only-cron-secret-0000"
  APP_URL: "http://localhost:3000"

jobs:
  build:
    runs-on: ubuntu-latest

    # Real Postgres so tests/integration/** (Milestone 11) exercises
    # actual constraints/transactions, not a mocked client — see
    # tests/integration/setup.ts.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lovebox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Test (unit, mocked Prisma)
        run: npm run test

      - name: Test (integration, real Postgres)
        run: npm run test:integration

      - name: Build
        run: npm run build
